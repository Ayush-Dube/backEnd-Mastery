<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Full viewport height */
            margin: 0;
            background-color: #fcffe5;/
        }
    </style>
</head>

<body>
    <form action="/show_register" method="POST" align="center">

        <table border="1">
            <tr>
                <th>
                    <label for="x1">NAME 📛 :</label>

                </th>
                <td>

                    <input type="text" name="naam" id="x1" required>
                </td>

            </tr>

            <tr>

                <th>
                    <label for="x2">City 🌆</label>

                </th>
                <td>
                    <input type="text" name="sahr" id="x2" required>

                </td>

            </tr>

            <tr>
                <th>
                    <label for="x3">Phone 📞</label>

                </th>
                <td>
                    <input type="text" name="mobileNO" id="x3" pattern="\d{10}" maxlength="10">

                </td>

            </tr>

        </table>


        <!-- <input type="submit"> -->
        <button type="submit">Submit</button>
    </form>

    <br>
    <br>
    <button id="putButton">PUT</button>

    <!-- <form action="/show_register" method="DELETE">
        <button type="submit" id="putButton">PUT</button>̥
    </form> -->

    <!-- The issue lies in how the browser handles HTTP methods like PUT or DELETE when submitting forms. 
     By default, HTML forms only support GET and POST methods. When you try to use PUT or DELETE in a form, 
     the browser will typically fall back to GET, which is why the elif part of your code is executed instead of the else part. -->

</body>
<script>

    document.getElementById('putButton').addEventListener('click', function () {
        fetch('/show_register', {
            method: 'PUT'
        })
            .then(response => response.text())
            .then(data => {
                // alert(data); // Display server response
                // return `${data}`;  // i was not able to show the data from the server on the webpage (barring alert)
                // console.log(data )

                // Approach 1
                document.open();
                document.write(data);
                document.close();

                // Approach 2



            })
            .catch(error => console.error('Error:', error));
    });

    //             window.location.href = response.url;
    //         })
    //         .catch(error => {
    //             console.error('Error:', error);
    //         });
    // });
</script>

</html>
