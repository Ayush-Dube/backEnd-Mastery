<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <!-- Bootstrap 5 CDN (Stable) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .card {
            border-radius: 15px;
        }
        .toggle-link {
            cursor: pointer;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-5">

        <!-- Login Form -->
        <div class="card p-4 shadow" id="loginForm">
            <h3 class="text-center mb-3">Login</h3>

            <form>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Enter password">
                </div>

                <button class="btn btn-primary w-100">Login</button>
            </form>

            <p class="text-center mt-3">
                Don't have an account?
                <span class="toggle-link" onclick="showRegister()">Register</span>
            </p>
        </div>

        <!-- Register Form -->
        <div class="card p-4 shadow d-none" id="registerForm">
            <h3 class="text-center mb-3">Register</h3>

            <form>
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter name">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create password">
                </div>

                <button class="btn btn-success w-100">Register</button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <span class="toggle-link" onclick="showLogin()">Login</span>
            </p>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function showRegister() {
        document.getElementById("loginForm").classList.add("d-none");
        document.getElementById("registerForm").classList.remove("d-none");
    }

    function showLogin() {
        document.getElementById("registerForm").classList.add("d-none");
        document.getElementById("loginForm").classList.remove("d-none");
    }
</script>

</body>
</html>
