<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 🌈 Gradient Background */
        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #583d76);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🧊 Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #a4f0ff;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
        }

        .toggle-link {
            cursor: pointer;
            color: #ffd369;
        }

        h3 {
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <!-- Login -->
            <div class="glass-card" id="loginForm">
                <h3 class="text-center mb-3">Login</h3>

                <form action="/fromBoot" method="POST">
                    <div class="mb-3" >
                        <input type="email" class="form-control" placeholder="Email" required name="usrEmail">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password" required name="usrPassword">
                    </div>

                    <button class="btn btn-light w-100">Login</button>
                </form>

                <p class="text-center mt-3">
                    Don’t have an account?
                    <span class="toggle-link" onclick="showRegister()">Register</span>
                </p>
            </div>

            <!-- Register -->
            <div class="glass-card d-none" id="registerForm">
                <h3 class="text-center mb-3">Register</h3>

                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Full Name">
                    </div>

                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email">
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <button class="btn btn-warning w-100">Register</button>
                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <span class="toggle-link" onclick="showLogin()">Login</span>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
    function showRegister() {
        document.getElementById("loginForm").classList.add("d-none");
        document.getElementById("registerForm").classList.remove("d-none");
    }

    function showLogin() {
        document.getElementById("registerForm").classList.add("d-none");
        document.getElementById("loginForm").classList.remove("d-none");
    }
</script>

</body>
</html>
